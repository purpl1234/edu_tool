<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>學習工具箱｜導航首頁</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&display=swap');

  :root{
    --paper:#FBF6EC;
    --paper-line: rgba(58,49,40,0.07);
    --ink:#3A3128;
    --ink-soft:#7A6E60;
    --card:#FFFEFB;
    --shadow: 0 8px 24px rgba(58,49,40,0.10);
    --shadow-hover: 0 14px 32px rgba(58,49,40,0.16);
    --radius: 18px;

    /* 工具分類色：朗讀類用青色，ACES 系列用同色系兩個深淺，方便一眼看出是同一套工具 */
    --teal:#2F6F6E;
    --teal-soft:#E4F1F0;
    --plum:#6B4E8C;
    --plum-soft:#ECE4F3;
    --plum-2:#9B6B9E;
    --plum-2-soft:#F4E7F2;
  }

  *{ box-sizing: border-box; }

  html,body{
    margin:0;
    padding:0;
    background: var(--paper);
    background-image: linear-gradient(var(--paper-line) 1px, transparent 1px);
    background-size: 100% 2.4em;
    color: var(--ink);
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", "Helvetica Neue", Arial, sans-serif;
    line-height: 1.6;
    min-height: 100vh;
  }

  .wrap{
    max-width: 920px;
    margin: 0 auto;
    padding: 40px 20px 60px;
  }

  header{
    text-align: center;
    margin-bottom: 36px;
  }
  header h1{
    font-family: 'Baloo 2', -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    font-size: clamp(1.7rem, 5vw, 2.3rem);
    margin: 0 0 8px;
    color: var(--ink);
  }
  header p{
    margin:0;
    color: var(--ink-soft);
    font-size: 0.98rem;
  }

  .grid{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 22px;
  }

  .tile{
    display: flex;
    flex-direction: column;
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 26px 22px 20px;
    text-decoration: none;
    color: var(--ink);
    border: 1px solid rgba(58,49,40,0.06);
    border-left: 6px solid var(--tile-accent, var(--teal));
    transition: transform .15s ease, box-shadow .15s ease;
    min-height: 168px;
  }
  .tile:hover, .tile:focus-visible{
    transform: translateY(-4px);
    box-shadow: var(--shadow-hover);
  }
  .tile:focus-visible{
    outline: 3px solid var(--tile-accent, var(--teal));
    outline-offset: 3px;
  }
  @media (prefers-reduced-motion: reduce){
    .tile{ transition: none; }
  }

  .tile-icon{
    font-size: 2.2rem;
    margin-bottom: 10px;
  }
  .tile-title{
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 6px;
    color: var(--ink);
  }
  .tile-desc{
    font-size: 0.92rem;
    color: var(--ink-soft);
    flex: 1;
  }
  .tile-tag{
    display: inline-block;
    font-size: 0.78rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 999px;
    background: var(--tile-tag-bg, var(--teal-soft));
    color: var(--tile-accent, var(--teal));
    margin-bottom: 12px;
    align-self: flex-start;
  }
  .tile-go{
    margin-top: 14px;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--tile-accent, var(--teal));
  }

  .tile.read   { --tile-accent: var(--teal);   --tile-tag-bg: var(--teal-soft); }
  .tile.aces1  { --tile-accent: var(--plum);   --tile-tag-bg: var(--plum-soft); }
  .tile.aces2  { --tile-accent: var(--plum-2); --tile-tag-bg: var(--plum-2-soft); }

  footer{
    text-align: center;
    margin-top: 40px;
    font-size: 0.82rem;
    color: var(--ink-soft);
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>📚 學習工具箱</h1>
    <p>點選卡片，前往對應的學習工具</p>
  </header>

  <div class="grid">

    <a class="tile read" href="https://purpl1234.github.io/edu_tool/read.html">
      <span class="tile-tag">朗讀練習</span>
      <div class="tile-icon">📖</div>
      <div class="tile-title">朗讀小教室</div>
      <div class="tile-desc">貼上短文、唸出來，自動比對哪些字唸對、哪些字要再練習。</div>
      <div class="tile-go">前往工具 →</div>
    </a>

    <a class="tile aces1" href="https://purpl1234.github.io/aces_Bigexam/">
      <span class="tile-tag">ACES 系列</span>
      <div class="tile-icon">🎯</div>
      <div class="tile-title">ACES 複習系統</div>
      <div class="tile-desc">大考重點複習，幫助掌握考試範圍與重要概念。</div>
      <div class="tile-go">前往工具 →</div>
    </a>

    <a class="tile aces2" href="https://purpl1234.github.io/aces/">
      <span class="tile-tag">ACES 系列</span>
      <div class="tile-icon">🔤</div>
      <div class="tile-title">ACES 單字小書</div>
      <div class="tile-desc">單字學習小書，累積詞彙量、隨時複習。</div>
      <div class="tile-go">前往工具 →</div>
    </a>

  </div>

  <footer>
    持續新增中 · 之後新增工具時，複製一個 .tile 卡片並修改連結、標題與說明即可。
  </footer>

</div>
</body>
</html>
